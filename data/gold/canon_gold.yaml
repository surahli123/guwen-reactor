# Chinese-anchored canon gold (Contract D / D2). Every atomic_fact.text is an English
# DENOTATION of its anchored Chinese chunk — actions and speech only, ZERO motive/evaluation
# (per annotation-guardrails.md). Validates against guwen_core.schema_validator.CanonScene.
# AI Reader-A draft; independent human denotation check pending (gold-cross-validation-protocol.md).
#
# G01 from Build_Ready_Spec_v3 §3.5 (chunk-anchored), with adversarial-audit fixes:
#   - F03 rewritten action-only ("keeps hoeing / handles no differently") — spec's "treats like"
#     was a disposition frame that risked smuggling evaluation into the literal layer.
#   - F05 de-evaluated ("prestigious"→"someone in an official's carriage"); person restored as referent.
#   - F10 added: literal 同席 (same mat) — the antecedent for B03 割席; closes the denotation chain.
#   - forbidden_claims extended to defend C02 (华歆慕荣 motive injection) + editorial evaluation,
#     so the drift suite has a C02 anchor (per annotation-guardrails.md §C two-way proof).
# Guardrail note: F04 is the literal "picks up then throws away" — NOT "covets/keeps".
# Deferred to Phase 4a eval_plan: F04 "picks up AND throws away both co-present to credit" contract.
scenes:
  - scene_id: G01
    title_en: "Guan Ning Cuts the Mat"
    title_zh: "管寧割席"
    source_id: shishuo_xinyu_de_xing_guan_ning

    source_chunks:
      - {chunk_id: C01, text_zh: "管寧、華歆共園中鋤菜，見地有片金，管揮鋤與瓦石不異，華捉而擲去之。"}
      - {chunk_id: C02, text_zh: "又嘗同席讀書，有乘軒冕過門者，寧讀如故，歆廢書出看。"}
      - {chunk_id: C03, text_zh: "寧割席分坐曰：「子非吾友也。」"}

    atomic_facts:
      - {id: F01, text: "Guan Ning and Hua Xin are gardening together.", source_chunk_ids: [C01]}
      - {id: F02, text: "They see a piece of gold in the ground.", source_chunk_ids: [C01]}
      - {id: F03, text: "Guan Ning keeps hoeing and handles the gold no differently from tile or stone.", source_chunk_ids: [C01]}
      - {id: F04, text: "Hua Xin picks up the gold and then throws it away.", source_chunk_ids: [C01]}
      - {id: F05, text: "Someone in an official's carriage passes by the gate while they are reading.", source_chunk_ids: [C02]}
      - {id: F06, text: "Guan Ning keeps reading.", source_chunk_ids: [C02]}
      - {id: F07, text: "Hua Xin stops reading to look at the carriage.", source_chunk_ids: [C02]}
      - {id: F08, text: "Guan Ning cuts the mat and separates their seats.", source_chunk_ids: [C03]}
      - {id: F09, text: "Guan Ning says Hua Xin is not his friend.", source_chunk_ids: [C03]}
      - {id: F10, text: "Guan Ning and Hua Xin are sitting on the same mat while reading.", source_chunk_ids: [C02]}

    required_beats:
      - {beat_id: B01, fact_ids: [F01, F02, F03, F04], description: "Gold test: the two friends respond differently to wealth."}
      - {beat_id: B02, fact_ids: [F05, F06, F07], description: "Carriage test: the two friends respond differently to status."}
      - {beat_id: B03, fact_ids: [F08, F09], description: "Mat-cutting: Guan Ning symbolically ends the friendship."}

    forbidden_claims:
      # C01 denotation traps
      - "Hua Xin keeps the gold."
      - "Guan Ning physically attacks Hua Xin."
      # C02 motive-injection traps (adversarial-audit blocking #2 — gives the drift suite a C02 anchor)
      - "Hua Xin is drawn to or covets the carriage's status."
      - "Hua Xin abandons his book because he envies wealth and rank."
      # editorial-evaluation-as-fact trap (《德行》 connotation slippery slope)
      - "Guan Ning is morally superior to Hua Xin."
      # scene-framing traps
      - "The two reconcile in the scene."
      - "The scene is romantic."

  # --- G02 詠雪 + G03 道旁苦李: AI Reader-A draft + 3-lens adversarial audit (workflow w3hx36mm0).
  #     Blocking fixes applied: G02 F02 member-list removed; G03 F03 subjectless 看 merged (open subject), F06 question-content trimmed.
