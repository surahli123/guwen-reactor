  - scene_id: G02
    title_en: Xie Daoyun's Snow Simile
    title_zh: 詠雪
    source_id: shishuo_xinyu_yan_yu_yong_xue
    source_chunks:
    - chunk_id: C01
      text_zh: 謝太傅寒雪日內集，
    - chunk_id: C02
      text_zh: 與兒女講論文義。
    - chunk_id: C03
      text_zh: 俄而雪驟，
    - chunk_id: C04
      text_zh: 公欣然曰：「白雪紛紛何所似？」
    - chunk_id: C05
      text_zh: 兄子胡兒曰：「撒鹽空中差可擬。」
    - chunk_id: C06
      text_zh: 兄女曰：「未若柳絮因風起。」
    - chunk_id: C07
      text_zh: 公大笑樂。
    - chunk_id: C08
      text_zh: 即公大兄無奕女，左將軍王凝之妻也。
    atomic_facts:
    - id: F01
      text: On a cold, snowy day, Grand Tutor Xie held a family gathering.
      source_chunk_ids:
      - C01
    - id: F02
      text: He discussed the meaning of literary texts with the younger members of the family.
      source_chunk_ids:
      - C02
    - id: F03
      text: Shortly afterward, the snow fell suddenly and heavily.
      source_chunk_ids:
      - C03
    - id: F04
      text: The Lord, with a pleased expression, asked what the thick, fast-falling white snow resembled.
      source_chunk_ids:
      - C04
    - id: F05
      text: The elder brother's son, Hu'er, said scattering salt in the air could roughly be compared to it.
      source_chunk_ids:
      - C05
    - id: F06
      text: The elder brother's daughter said it was not as good as willow catkins rising on the wind.
      source_chunk_ids:
      - C06
    - id: F07
      text: The Lord laughed heartily and was delighted.
      source_chunk_ids:
      - C07
    - id: F08
      text: She was the daughter of the Lord's eldest elder brother Wuyi.
      source_chunk_ids:
      - C08
    - id: F09
      text: She was the wife of Wang Ningzhi, General of the Left.
      source_chunk_ids:
      - C08
    required_beats:
    - beat_id: B01
      fact_ids:
      - F01
      - F02
      description: 'Setup: on a cold snowy day, Grand Tutor Xie gathers the family and discusses literary texts with the younger generation.'
    - beat_id: B02
      fact_ids:
      - F03
      - F04
      description: 'Trigger + question: snow falls suddenly; the Lord, pleased, asks what the falling white snow resembles.'
    - beat_id: B03
      fact_ids:
      - F05
      description: 'First answer (speaker turn = Hu''er): the scattered-salt simile.'
    - beat_id: B04
      fact_ids:
      - F06
      description: 'Second answer (speaker turn = the niece): the willow-catkin simile.'
    - beat_id: B05
      fact_ids:
      - F07
      description: 'Reaction: the Lord laughs heartily and is delighted (recorded reaction only — no stated preference).'
    forbidden_claims:
    - The niece's willow-catkin simile is better than Hu'er's scattered-salt simile.
    - Grand Tutor Xie laughed because the niece's answer was better.
    - Grand Tutor Xie praised or singled out the niece's answer.
    - The Grand Tutor is named Xie An.
    - Hu'er is named Xie Lang.
    - The niece is named Xie Daoyun.
    - One of the children felt embarrassed or proud at the Lord's reaction.
    - The niece won the snow-simile contest.
    - Grand Tutor Xie was discussing the texts with his own sons and daughters.
    - The scattered-salt simile is dismissed by the narrator as inferior.
  - scene_id: G03
    title_en: Wang Rong and the Roadside Plums
    title_zh: 道旁苦李
    source_id: shishuo_xinyu_ya_liang_dao_pang_ku_li
    source_chunks:
    - chunk_id: C01
      text_zh: 王戎七歲，
    - chunk_id: C02
      text_zh: 嘗與諸小兒遊。
    - chunk_id: C03
      text_zh: 看道邊李樹多子折枝，
    - chunk_id: C04
      text_zh: 諸兒競走取之，
    - chunk_id: C05
      text_zh: 唯戎不動。
    - chunk_id: C06
      text_zh: 人問之，
    - chunk_id: C07
      text_zh: 答曰：「樹在道邊而多子，此必苦李。」
    - chunk_id: C08
      text_zh: 取之，
    - chunk_id: C09
      text_zh: 信然。
    atomic_facts:
    - id: F01
      text: Wang Rong was seven years old.
      source_chunk_ids:
      - C01
    - id: F02
      text: On one occasion he was roaming and playing with a group of other young children.
      source_chunk_ids:
      - C02
    - id: F03
      text: By the roadside, a plum tree laden with fruit, its branches weighed down, was seen (subject unspecified).
      source_chunk_ids:
      - C03
    - id: F04
      text: The other children raced over to pick the plums.
      source_chunk_ids:
      - C04
    - id: F05
      text: Only Wang Rong did not move (did not go to pick).
      source_chunk_ids:
      - C05
    - id: F06
      text: Someone asked Wang Rong.
      source_chunk_ids:
      - C06
    - id: F07
      text: Wang Rong answered that the tree stands by the roadside yet has many fruits, so these must be bitter plums.
      source_chunk_ids:
      - C07
    - id: F08
      text: Afterward the plums were picked (by an unspecified party).
      source_chunk_ids:
      - C08
    - id: F09
      text: It turned out to be just as Wang Rong had said.
      source_chunk_ids:
      - C09
    required_beats:
    - beat_id: B01
      fact_ids:
      - F01
      - F02
      description: 'Setup: seven-year-old Wang Rong is out roaming with a group of other children.'
    - beat_id: B02
      fact_ids:
      - F03
      description: They come upon a roadside plum tree so loaded with fruit that the branches bend.
    - beat_id: B03
      fact_ids:
      - F04
      - F05
      description: 'Contrast in action: the other children scramble to pick; only Wang Rong does not move.'
    - beat_id: B04
      fact_ids:
      - F06
      - F07
      description: 'When asked, Wang Rong states his claim: a heavily-fruited tree left untouched by the roadside must bear bitter plums.'
    - beat_id: B05
      fact_ids:
      - F08
      - F09
      description: 'Resolution: the plums are picked, and the outcome matches Wang Rong''s claim.'
    forbidden_claims:
    - The plums were tasted and found to be bitter.
    - The plums are bitter because the tree grows by the roadside.
    - Wang Rong picked or tasted the plums himself.
    - Wang Rong is clever, intelligent, or wise.
    - Wang Rong is precocious or unusually mature for his age.
    - Wang Rong shows poise or magnanimity.
    - The other children were greedy or foolish.
    - The branches of the plum tree were broken or snapped.
    - Wang Rong reasoned that passers-by had already eaten the sweet plums.
    - No one ever picked the plums.
