<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原型 D · 多篇中心站(門類分区 + 篇目榜) — 世說新語 · 看得見的忠實</title>
<!--
  PROTOTYPE D — C-modified v2 骨架 + Q3 寻路原型。
  评审合议(reviews/2026-07-01-proto-bc-synthesis.md)5 个 BLOCKER 的修法已建入:
    B1 节点=文章(G01/G02/G03 三枚签牌),beat 下沉册页、数据驱动
    B2 灯火=按篇核实状态(G01-G03 亮;G04-G10 为 tier-2 收录,金标/读本待建,灯暗=诚实);印章带作用域注(已核实 3/10 篇);徽章按篇+口径句
    B3 跨篇动线:地图即 hub + 右上「篇目」榜(門類分组,中性排序)
    B5 不伪造地理:門類分区(德行/言語/雅量,canon_gold source_id 现成)+「非地理」声明
  Q2 已定:开场展卷 localStorage 门控,首访播一次(可跳过),之后直达。
  仍为占位:标题字(待 LXGW 子集)。朱笔闸门已升级为浏览器内真跑规则子集(TRUST-UX-SPEC Wave 1);
  前置入口=朱封签牌(#gateCard,首屏左下)。
  G02/G03 生动读本【未创作】——只显示文言原文+诚实状态,绝不代笔(改字须独立忠实审校)。
  单文件离线:0 外部请求。G01 SCENE 数据逐字复用 v1(REVIEWED·PASS)。
-->
<style>
  :root{
    --ground:#141109; --silk:#e8dab9; --silk-2:#e0cfa8; --silk-edge:#c7b184;
    --ink:#2a2116; --ink-soft:#6a5c42; --ink-faint:#9a8a6a;
    --qing:#2f5b6d; --lu:#3f7458; --pine:#25503f;
    --amber:#e6a441; --amber-soft:#f0c072; --ember:#7a6242;
    --zhu:#a83a29; --zhu-bright:#c2422c;
    --line:rgba(122,102,64,.28);
    --f-title:"Xingkai SC","STXingkai","Weibei SC","Baoli SC","KaiTi","Kaiti SC","STKaiti","楷体",serif;
    --f-song:"Songti SC","STSong","Songti TC","SimSun","Noto Serif SC",serif;
    --f-kai:"Kaiti SC","STKaiti","KaiTi","楷体","Noto Serif SC",serif;
    --f-latin:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--ground);font-family:var(--f-song);color:var(--ink);}

  /* ---------- 舞台 ---------- */
  .stage{
    position:fixed;inset:0;overflow:hidden;
    background:
      radial-gradient(130% 100% at 50% -10%, #f0e4c4 0%, var(--silk) 42%, var(--silk-2) 72%, var(--silk-edge) 100%);
  }
  .stage::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:3;
    filter:url(#paper);opacity:.42;mix-blend-mode:multiply;}
  .stage::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:3;
    box-shadow:inset 0 0 120px 30px rgba(70,52,28,.28);}

  @media (prefers-reduced-motion:no-preference){
    .stage.unrolling{clip-path:inset(0 0 0 100%);animation:unroll 3.4s cubic-bezier(.3,.65,.25,1) .3s forwards;}
    #roller.unrolling{transform:translateX(0);animation:roll 3.4s cubic-bezier(.3,.65,.25,1) .3s forwards;}
  }
  @keyframes unroll{from{clip-path:inset(0 0 0 100%);}to{clip-path:inset(0 0 0 0);}}
  /* 卷轴杆用 transform 位移(评审:勿动 layout 属性) */
  #roller{
    position:fixed;top:-2vh;bottom:-2vh;width:26px;left:calc(100% - 8px);z-index:6;pointer-events:none;
    transform:translateX(0);
    background:linear-gradient(90deg,#1d150a,#4a3820 30%,#6b5432 50%,#4a3820 70%,#1d150a);
    border-radius:12px;box-shadow:0 0 22px 4px rgba(0,0,0,.55);
    visibility:hidden;
  }
  #roller.unrolling{visibility:visible;}
  @keyframes roll{from{transform:translateX(0);}to{transform:translateX(calc(-100vw - 26px));}}
  #roller::before,#roller::after{content:"";position:absolute;left:50%;transform:translateX(-50%);
    width:38px;height:16px;border-radius:8px;
    background:linear-gradient(90deg,#2b2113,#7a6238 50%,#2b2113);}
  #roller::before{top:6vh;} #roller::after{bottom:6vh;}
  #skipNote{position:fixed;bottom:30px;right:34px;z-index:6;
    font-family:var(--f-kai);font-size:12px;letter-spacing:.22em;color:rgba(232,218,185,.85);
    transition:opacity .4s;visibility:hidden;}
  #skipNote.on{visibility:visible;}
  #skipNote.gone,#roller.gone{opacity:0;visibility:hidden;}

  #world{position:absolute;inset:-5%;
    transition:transform 1.25s cubic-bezier(.22,.9,.28,1);will-change:transform;}
  @media (prefers-reduced-motion:reduce){
    #world{transition:none;}
  }
  .hills{position:absolute;inset:0;width:100%;height:100%;}

  /* ---------- 門類界碑(分区标签,非地理) ---------- */
  .zone{
    position:absolute;left:var(--x);top:var(--y);transform:translate(-50%,-50%);
    writing-mode:vertical-rl;text-orientation:upright;pointer-events:none;
    font-family:var(--f-kai);font-size:14px;letter-spacing:.5em;color:rgba(74,58,32,.55);
    padding:12px 4px 14px;border:1px solid rgba(90,70,40,.22);border-radius:2px;
    background:linear-gradient(175deg, rgba(224,207,168,.55), rgba(199,177,132,.45));
  }
  .zone small{writing-mode:vertical-rl;font-size:9px;letter-spacing:.3em;color:rgba(74,58,32,.4);margin-top:6px;}

  /* ---------- 驿站(签牌=一篇文章) ---------- */
  .station{
    position:absolute;left:var(--x);top:var(--y);transform:translate(-50%,-50%);
    background:none;border:none;cursor:pointer;z-index:2;
    display:flex;flex-direction:column;align-items:center;gap:7px;
    -webkit-tap-highlight-color:transparent;
  }
  .lamp{width:13px;height:13px;border-radius:50%;}
  .lamp.lit{
    background:radial-gradient(circle at 40% 35%, var(--amber-soft), var(--amber) 55%, #b9791f 100%);
    box-shadow:0 0 5px 1px rgba(230,164,65,.7), 0 0 12px 3px rgba(230,164,65,.32);
  }
  @media (prefers-reduced-motion:no-preference){
    .lamp.lit{animation:flicker 4.5s ease-in-out infinite;}
  }
  @keyframes flicker{0%,100%{opacity:.85;}45%{opacity:1;}70%{opacity:.76;}}
  /* 灯暗 = 读本待创作(评审 B2:诚实状态,严禁与已核实同亮) */
  .lamp.ember{
    width:11px;height:11px;
    background:radial-gradient(circle at 40% 35%, #8f7550, var(--ember) 60%, #55432c 100%);
    box-shadow:0 0 3px 0 rgba(122,98,66,.4);opacity:.7;
  }
  .qianpai{
    writing-mode:vertical-rl;text-orientation:upright;
    font-family:var(--f-kai);font-size:17px;letter-spacing:.24em;color:var(--ink);
    background:linear-gradient(172deg,#e9d6ab,#d7bd8e);
    border:1px solid rgba(90,66,32,.55);border-radius:3px;
    padding:10px 5px 12px;line-height:1;
    box-shadow:0 2px 6px -1px rgba(40,28,10,.45);
    position:relative;transition:background .3s,color .3s,box-shadow .3s;
  }
  .qianpai::before{content:"";position:absolute;top:3px;left:50%;transform:translateX(-50%);
    width:4px;height:4px;border-radius:50%;background:rgba(90,70,40,.55);}
  .st-en{font-family:var(--f-latin);font-style:italic;font-size:11px;color:var(--ink-soft);letter-spacing:.04em;}
  /* 褐纸签微斜:延绥东路地理图本的贴签感 */
  .station:nth-of-type(3n) .qianpai{transform:rotate(-1.3deg);}
  .station:nth-of-type(3n+1) .qianpai{transform:rotate(.9deg);}
  .station:hover .qianpai{box-shadow:0 3px 10px -1px rgba(40,28,10,.55), 0 0 0 1px rgba(230,164,65,.45);}
  .station:focus-visible{outline:none;}
  .station:focus-visible .qianpai{box-shadow:0 0 0 2px var(--amber);}
  .station.selected .qianpai{
    background:linear-gradient(175deg,#2c5a48,var(--pine));
    color:#f0e6cc;border-color:rgba(20,40,30,.7);
  }
  .station.selected .qianpai::before{background:rgba(240,230,204,.7);}
  /* 密度预览 ghost 签牌:演示用,非真实篇目,不可点 */
  .station.ghost{cursor:default;opacity:0;pointer-events:none;transition:opacity .5s;}
  .stage.density .station.ghost{opacity:.5;pointer-events:auto;cursor:help;}
  .station.ghost .qianpai{color:var(--ink-faint);background:linear-gradient(175deg,#ece0c4,#dccba6);}

  /* ---------- chrome ---------- */
  .title-vert{
    position:fixed;left:26px;top:26px;z-index:4;display:flex;gap:10px;
    writing-mode:vertical-rl;text-orientation:upright;
    font-family:var(--f-title);font-size:clamp(30px,4.6vh,44px);letter-spacing:.16em;
    color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.25);
  }
  .title-src{writing-mode:vertical-rl;font-family:var(--f-song);font-size:12px;
    color:var(--ink-faint);letter-spacing:.12em;margin-top:8px;}
  .corner-seal-wrap{position:fixed;left:30px;bottom:30px;z-index:4;display:flex;flex-direction:column;gap:7px;align-items:center;}
  .corner-seal{
    width:52px;height:52px;background:var(--zhu);border-radius:2px;transform:rotate(-2.5deg);
    display:grid;grid-template-columns:1fr 1fr;padding:5px;gap:1px;
    box-shadow:0 3px 9px -3px rgba(0,0,0,.5);
  }
  .corner-seal span{font-family:var(--f-title);font-size:15px;color:var(--silk);display:grid;place-items:center;}
  /* 印章作用域注(评审 B2:不作全站担保) */
  .seal-scope{font-family:var(--f-kai);font-size:10.5px;letter-spacing:.1em;color:var(--ink-soft);}

  .ctl{position:fixed;top:20px;right:22px;z-index:6;display:flex;gap:10px;
    transition:right .55s cubic-bezier(.22,.9,.28,1);}
  /* 面板滑入时控件签牌同步左移,始终可点(参考站右上签牌常驻) */
  body.panelopen .ctl{right:calc(clamp(350px,30vw,450px) + 18px);}
  @media (prefers-reduced-motion:reduce){.ctl{transition:none;}}
  .ctl .tab{
    writing-mode:vertical-rl;text-orientation:upright;
    font-family:var(--f-kai);font-size:12.5px;letter-spacing:.2em;color:var(--ink-soft);
    background:linear-gradient(175deg,#f2e8ce,#e4d5b0);border:1px solid rgba(90,70,40,.42);
    border-radius:3px;padding:9px 4px 10px;
    box-shadow:0 2px 5px -1px rgba(40,28,10,.4);
  }
  .ctl button.tab{cursor:pointer;color:var(--ink);}
  .ctl button.tab:hover{box-shadow:0 2px 8px -1px rgba(40,28,10,.5), 0 0 0 1px rgba(230,164,65,.45);}
  .ctl button.tab:focus-visible{outline:none;box-shadow:0 0 0 2px var(--amber);}
  .ctl .tab.dead{opacity:.5;cursor:not-allowed;}

  .hint{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:4;
    font-family:var(--f-kai);font-size:13.5px;letter-spacing:.3em;color:var(--ink-soft);
    background:rgba(232,218,185,.9);padding:7px 18px 7px 22px;border-radius:999px;
    border:1px solid var(--line);
  }
  .geo-note{
    position:fixed;bottom:28px;right:26px;z-index:4;
    font-family:var(--f-kai);font-size:11px;letter-spacing:.14em;color:var(--ink-faint);
  }
  .proto-tag{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:4;
    font-family:var(--f-kai);font-size:11px;letter-spacing:.18em;color:var(--ink-faint);
    border:1px dashed rgba(122,102,64,.45);border-radius:2px;padding:3px 10px;
    background:rgba(232,218,185,.6);
  }

  /* ---------- 册页面板:贴右缘满高的书页(评审:非浮卡) ---------- */
  #panel{
    position:fixed;top:0;bottom:0;right:0;z-index:5;
    width:clamp(350px,30vw,450px);
    background:
      linear-gradient(160deg, rgba(255,250,235,.35), rgba(0,0,0,.03)),
      radial-gradient(120% 100% at 30% 0%, #efe3c4 0%, #e6d7b2 60%, #d9c69c 100%);
    border-left:1px solid rgba(90,70,40,.45);
    box-shadow:inset 6px 0 14px -8px rgba(60,42,18,.5), -14px 0 44px -20px rgba(20,12,4,.5);
    transform:translateX(105%);
    transition:transform .55s cubic-bezier(.22,.9,.28,1);
    display:flex;flex-direction:column;overflow:hidden;
  }
  @media (prefers-reduced-motion:reduce){#panel{transition:none;}}
  #panel.open{transform:translateX(0);}
  #panel::before{content:"";position:absolute;inset:0;pointer-events:none;filter:url(#paper);opacity:.35;mix-blend-mode:multiply;}
  .panel-in{position:relative;overflow-y:auto;padding:24px 24px 28px;scrollbar-width:thin;flex:1;}
  .panel-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:4px;}
  .p-title-zh{font-family:var(--f-title);font-size:30px;letter-spacing:.08em;color:var(--ink);line-height:1.2;}
  .p-title-en{font-family:var(--f-latin);font-style:italic;font-size:13px;color:var(--ink-soft);margin-top:3px;}
  .p-btns{margin-left:auto;display:flex;gap:6px;flex-shrink:0;}
  .close{
    background:none;border:1px solid var(--line);border-radius:2px;
    font-family:var(--f-kai);font-size:12px;color:var(--ink-soft);padding:4px 9px;cursor:pointer;flex-shrink:0;
  }
  .close:hover{color:var(--ink);border-color:var(--ink-faint);}
  .p-src{font-family:var(--f-kai);font-size:12.5px;color:var(--ink-faint);letter-spacing:.08em;margin:8px 0 4px;}
  .p-meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px;}
  .chip{font-family:var(--f-kai);font-size:11px;letter-spacing:.08em;padding:3px 9px;border-radius:2px;
    border:1px solid var(--line);color:var(--ink-soft);}
  .chip.ok{color:#f0e6cc;background:var(--pine);border-color:rgba(20,40,30,.6);}
  .chip.pend{color:var(--ink-faint);background:rgba(122,102,64,.08);}
  /* 徽章口径句:平实语言领跑,技术口径降级为小字(non-tech 读者优先) */
  .p-koujing{font-family:var(--f-kai);font-size:12px;color:var(--ink-soft);line-height:1.8;
    border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);padding:8px 0;margin:10px 0 16px;}
  .p-koujing .tech{display:block;font-size:10px;color:var(--ink-faint);margin-top:4px;letter-spacing:.04em;}
  .kaoju-plain{font-family:var(--f-kai);font-size:12.5px;color:var(--ink);line-height:1.75;margin-bottom:6px;}

  .beat-block{margin-bottom:20px;}
  .beat-head{display:flex;align-items:baseline;gap:10px;margin:14px 0 10px;}
  .beat-seal{font-family:var(--f-title);font-size:17px;color:var(--silk);background:var(--qing);
    padding:3px 8px 4px;border-radius:2px;letter-spacing:.06em;}
  .beat-title{font-family:var(--f-latin);font-style:italic;color:var(--ink-soft);font-size:13px;}
  .beat-desc{font-family:var(--f-kai);color:var(--ink-faint);font-size:11.5px;}

  /* 引文框:全 1px 细框 + 纸色底(评审 BAN 1 裁决:去左侧色条,仿刻本全框) */
  .yuanwen{
    font-family:var(--f-song);font-size:18px;letter-spacing:.07em;line-height:2.05;color:var(--ink);
    padding:12px 15px;margin-bottom:12px;
    border:1px solid rgba(122,90,52,.4);background:rgba(240,228,198,.5);
    border-radius:1px;
  }
  .yuanwen .ph{border-radius:2px;transition:background .35s, box-shadow .35s;padding:0 1px;}
  .yuanwen .ph.lit{
    background:rgba(230,164,65,.34);
    box-shadow:0 0 0 1px rgba(230,164,65,.5), 0 0 12px 2px var(--amber-soft);
  }

  .line{
    display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:baseline;
    padding:8px 10px 8px 8px;border-radius:3px;cursor:pointer;
    border:1px solid transparent;transition:background .25s;
  }
  .line:hover{background:rgba(122,102,64,.08);}
  .line:focus-visible{outline:none;border-color:var(--amber);}
  .line.active{background:rgba(230,164,65,.13);border-color:rgba(230,164,65,.4);}
  /* 行标 = 中性墨点(评审:amber 只留给「核实」动作) */
  .dot{width:6px;height:6px;border-radius:50%;background:var(--ink-faint);flex-shrink:0;transform:translateY(-2px);}
  .line.active .dot{background:var(--amber);box-shadow:0 0 6px 1px rgba(230,164,65,.6);}
  .line-en{font-family:var(--f-latin);font-size:14.5px;color:var(--ink);line-height:1.65;}
  .line-cue{font-family:var(--f-kai);font-size:10.5px;color:var(--ink-faint);letter-spacing:.12em;white-space:nowrap;}
  .line:hover .line-cue,.line.active .line-cue{color:var(--zhu);}

  /* 考据:grid-rows 手风琴(评审:替换 max-height hack,长 claim 不截断) */
  .kaoju{display:grid;grid-template-rows:0fr;transition:grid-template-rows .4s ease;margin:0 0 0 24px;}
  @media (prefers-reduced-motion:reduce){.kaoju{transition:none;}}
  .kaoju.show{grid-template-rows:1fr;margin-bottom:8px;}
  .kaoju-clip{overflow:hidden;min-height:0;}
  .kaoju-in{padding:8px 12px 10px;background:rgba(122,102,64,.05);border-radius:2px;}
  .kaoju-k{font-family:var(--f-kai);font-size:10.5px;letter-spacing:.14em;color:var(--ink-faint);margin-bottom:4px;}
  .kaoju-claim{font-family:var(--f-latin);font-style:italic;font-size:13px;color:var(--ink-soft);line-height:1.6;}
  .stamp{margin-top:9px;display:inline-flex;align-items:center;gap:8px;font-family:var(--f-kai);font-size:11.5px;color:var(--zhu);}
  .stamp .sq{font-family:var(--f-title);font-size:13px;color:var(--silk);background:var(--zhu);
    width:25px;height:25px;display:grid;place-items:center;border-radius:2px;transform:rotate(-3deg);}

  /* 待创作篇的诚实状态卡 */
  .pending-card{
    border:1px dashed rgba(122,102,64,.45);border-radius:2px;padding:14px 16px;margin:6px 0 16px;
    font-family:var(--f-kai);font-size:13px;color:var(--ink-soft);line-height:1.9;
    background:rgba(122,102,64,.05);
  }
  .pending-card b{color:var(--ink);}

  .panel-foot{font-family:var(--f-kai);font-size:11px;color:var(--ink-faint);letter-spacing:.06em;
    padding:10px 24px 14px;border-top:1px dashed var(--line);position:relative;}

  /* ---------- 篇目榜(index 视图) ---------- */
  .idx-group{margin-bottom:18px;}
  .idx-men{font-family:var(--f-kai);font-size:13px;letter-spacing:.35em;color:var(--ink-soft);
    border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:8px;}
  .idx-item{
    display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
    padding:9px 10px;border-radius:3px;cursor:pointer;border:1px solid transparent;
  }
  .idx-item:hover{background:rgba(122,102,64,.08);}
  .idx-item:focus-visible{outline:none;border-color:var(--amber);}
  .idx-zh{font-family:var(--f-kai);font-size:16px;letter-spacing:.1em;color:var(--ink);}
  .idx-en{font-family:var(--f-latin);font-style:italic;font-size:11.5px;color:var(--ink-faint);display:block;margin-top:2px;}
  .idx-meta{font-family:var(--f-kai);font-size:10.5px;color:var(--ink-faint);text-align:right;line-height:1.7;white-space:nowrap;}
  .idx-note{font-family:var(--f-kai);font-size:11px;color:var(--ink-faint);line-height:1.9;margin-top:14px;
    border-top:1px dashed var(--line);padding-top:10px;}
  .idx-tools{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .idx-tools button{
    font-family:var(--f-kai);font-size:11.5px;letter-spacing:.1em;color:var(--ink-soft);
    background:none;border:1px solid var(--line);border-radius:2px;padding:5px 10px;cursor:pointer;
  }
  .idx-tools button:hover{color:var(--ink);border-color:var(--ink-faint);}
  .idx-tools button[aria-pressed="true"]{color:#f0e6cc;background:var(--pine);border-color:rgba(20,40,30,.6);}

  /* ---------- 信任层(EN 领跑)+ 朱笔闸门 ---------- */
  .kaoju-lead{font-family:var(--f-latin);font-size:12.5px;color:var(--lu);letter-spacing:.04em;margin-bottom:5px;font-weight:600;}
  .kaoju-fact{font-family:var(--f-latin);font-style:italic;font-size:13.5px;color:var(--ink);line-height:1.6;}

  .switch .track{position:absolute;inset:0;background:#b7a583;border-radius:999px;transition:background .3s;}
  .switch .knob{position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#f0e6cc;

  .gatecard:focus-visible{outline:none;box-shadow:0 0 0 2px var(--zhu);}
  .gc-seal{

  .kaoju-zhsrc{font-family:var(--f-song);font-style:normal;letter-spacing:.05em;color:var(--ink);}

/* 闸门交互:先算后演。verdict 同步算出(console.log 先于首行揭示,可证——
   动画只是已算出结果的逐行排版,不是假进度)。关闸全复原,可反复扳。 */
let gateTimers=[]; let gateCaseIdx=0;
function wireGate(bar,gh,sc){
  const led=gh.querySelector("#gateLedger"), src=gh.querySelector("#gateSrc"),
        ver=gh.querySelector("#gateVerdict"), fl=gh.querySelector(".ghost-false"),
        again=gh.querySelector("#gateAgain");
  const reduced=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  function reset(){
    gateTimers.forEach(clearTimeout); gateTimers=[];
    led.innerHTML=""; src.innerHTML=""; src.classList.remove("on");
    ver.textContent=""; ver.classList.remove("on");
    fl.classList.remove("struck"); again.classList.remove("on");
    const st=document.getElementById("chipStats");
    if(st){st.textContent=sc.stats; st.classList.remove("blocked");}
  }
  /* 轮换案例走同一条真计算路径;案例 B(动机走私,引用真实 F08 仍被抓)证明非关键词匹配 */
  function runCase(c){
    reset();
    fl.textContent=c.en;
    const r=gateCheck(c.en,c.motive);            /* ① 先算(同步) */
    const label=r.why==="unhedged-motive"?"UNHEDGED MOTIVE":r.verdict;
    console.log("[gate] verdict computed before reveal:",r.verdict,r.fact?"at "+r.fact.id:"",r.why||"");
    led.innerHTML='<div class="ledger-h" lang="en">CHECKING AGAINST SOURCE FACTS · 逐条核对</div>';
    const rows=r.steps.map(s=>{
      const row=el("div","ledger-row "+(s.hit?"fail":"pass"));
      row.innerHTML=s.hit?"<b>"+s.fact+" ✗ CONTRADICTION</b>":"<b>"+s.fact+" ✓</b> pass";
      led.appendChild(row); return row;
    });
    if(r.why==="unhedged-motive"){
      const mr=el("div","ledger-row fail");
      mr.innerHTML="<b>✗ UNHEDGED MOTIVE</b> — \u201c"+c.motive.text+"\u201d is not stated in the source (the event itself, "+c.motive.eventFact+", is real ✓)";
      led.appendChild(mr); rows.push(mr);
    }
    const stepMs=reduced?0:(rows.length>6?140:230);   /* ② 逐行揭示已算出的结果 */
    rows.forEach((row,i)=>gateTimers.push(setTimeout(()=>row.classList.add("on"),120+i*stepMs)));
    gateTimers.push(setTimeout(()=>{             /* ③ 源文并排 + 朱笔落线 + 定谳 */
      if(r.fact){
        const zq=r.fact.zh.startsWith("「")?r.fact.zh:"「"+r.fact.zh+"」";
        const extra=r.why==="unhedged-motive"?" — the source states the act, never a motive.":"";
        src.innerHTML='<div class="srccard-k" lang="en">SOURCE SAYS · 原文</div>'+
          '<div class="srccard-zh">'+zq+'</div>'+
          '<div class="srccard-en" lang="en">'+sc.facts[r.fact.id]+' ('+r.fact.id+')'+extra+'</div>';
        src.classList.add("on");
      }
      fl.classList.add("struck");
      ver.textContent="朱批 ✗ "+label+" · export BLOCKED";
      ver.title="zh\u016bp\u012b — the vermilion ink reserved for a verdict. Here: the engine\u2019s rejection mark.";
      ver.classList.add("on");
      again.classList.add("on");
      const st=document.getElementById("chipStats");
      if(st){st.textContent="✗ 1 fabrication blocked · "+label+" · export BLOCKED";st.classList.add("blocked");}
    },120+rows.length*stepMs+180));
  }
  bar.querySelector("#gateToggle").addEventListener("change",e=>{
    const on=e.target.checked;
    gh.classList.toggle("show",on);
    if(!on){reset();return;}
    runCase(GATE_CASES[gateCaseIdx]);
    gh.scrollIntoView({behavior:"smooth",block:"center"});
  });
  again.addEventListener("click",()=>{
    gateCaseIdx=(gateCaseIdx+1)%GATE_CASES.length;
    runCase(GATE_CASES[gateCaseIdx]);
  });
}

  stage.style.clipPath="none";
  roller.classList.add("gone"); skipNote.classList.add("gone");
  try{localStorage.setItem("gw_unroll_seen","1");}catch(e){}
}

try{seen=localStorage.getItem("gw_unroll_seen")==="1";}catch(e){}

if(!seen&&!reduced){
  stage.classList.add("unrolling"); roller.classList.add("unrolling"); skipNote.classList.add("on");
  stage.addEventListener("animationend",endUnroll,{once:true});
  document.addEventListener("click",()=>{if(!unrolled)endUnroll();},{capture:true});
  document.addEventListener("keydown",()=>{if(!unrolled)endUnroll();},{capture:true});
}else{

}

  /* 计里画方:禹迹图式淡方格——"网格即披露"(Codex 评审 S3 + 古图研究 token 1) */
  const jg=document.getElementById("jili");
  for(let gx=0;gx<=1600;gx+=64){
    const l=document.createElementNS(NSx,"line");
    l.setAttribute("x1",gx);l.setAttribute("y1",0);l.setAttribute("x2",gx);l.setAttribute("y2",900);
    l.setAttribute("stroke","#4a3a20");l.setAttribute("stroke-width","1");l.setAttribute("opacity",".055");
    jg.appendChild(l);
  }
  for(let gy=0;gy<=900;gy+=64){
    const l=document.createElementNS(NSx,"line");
    l.setAttribute("x1",0);l.setAttribute("y1",gy);l.setAttribute("x2",1600);l.setAttribute("y2",gy);
    l.setAttribute("stroke","#4a3a20");l.setAttribute("stroke-width","1");l.setAttribute("opacity",".055");
    jg.appendChild(l);
  }
  const tintsG=document.getElementById("tints");
  GEO.TINTS.forEach(t=>{
    const e=document.createElementNS(NSx,"ellipse");
    e.setAttribute("cx",t.cx);e.setAttribute("cy",t.cy);e.setAttribute("rx",t.rx);e.setAttribute("ry",t.ry);
    e.setAttribute("fill",t.fill);e.setAttribute("opacity",t.op);e.setAttribute("filter","url(#mistBM)");
    tintsG.appendChild(e);
  });
  function sample(pts,t){
    const segs=[];let total=0;
    for(let i=0;i<pts.length-1;i++){const d=Math.hypot(pts[i+1][0]-pts[i][0],pts[i+1][1]-pts[i][1]);segs.push(d);total+=d;}
    let dist=t*total;
    for(let i=0;i<segs.length;i++){
      if(dist<=segs[i]){const k=dist/segs[i];
        return [pts[i][0]+(pts[i+1][0]-pts[i][0])*k, pts[i][1]+(pts[i+1][1]-pts[i][1])*k];}
      dist-=segs[i];
    }
    return pts[pts.length-1];
  }
  const g=document.getElementById("ranges");
  function moundD(x,y,w,h){
    const lw=w*(0.8+rnd()*0.45), rw=w*(0.8+rnd()*0.45);
    const apexX=x+(rnd()*0.56-0.28)*w;
    return "M"+(x-lw)+","+(y+3)
      +" Q"+(x-lw*0.42)+","+(y-h*0.48)+" "+apexX+","+(y-h)
      +" Q"+(x+rw*0.5)+","+(y-h*0.42)+" "+(x+rw)+","+(y+3)+" Z";
  }
  function sanxingD(x,y,w,h){ /* 三瓣山形符(华夷图 mountainGlyph) */
    return moundD(x,y,w*0.55,h)+" "+moundD(x-w*0.58,y+2,w*0.42,h*0.58)+" "+moundD(x+w*0.6,y+2,w*0.4,h*0.52);
  }
  function ridgeD(x,y,w,h){ /* 低脊晕:一笔多峰 */
    let d="M"+(x-w*1.3)+","+(y+3);
    for(let k=0;k<4;k++){
      const bx1=x-w*1.3+(2.6*w)*((k+1)/4);
      const ax=x-w*1.3+(2.6*w)*((k+0.5)/4)+(rnd()*6-3);
      d+=" Q"+ax+","+(y-h*(0.45+rnd()*0.5))+" "+bx1+","+(y+(rnd()*3-1));
    }
    return d+" L"+(x+w*1.3)+","+(y+9)+" L"+(x-w*1.3)+","+(y+9)+" Z";
  }
  function addHill(x,y,w,h,fill,op,ink,kind){
    const p=document.createElementNS(NSx,"path");
    const kk=kind||"mound";
    const d=kk==="sanxing"?sanxingD(x,y,w,h):kk==="ridge"?ridgeD(x,y,w*0.8,h*0.6):moundD(x,y,w,h);
    p.setAttribute("d",d);p.setAttribute("fill",fill);p.setAttribute("opacity",String(kk==="ridge"?op*0.8:op));
    p.setAttribute("filter","url(#brushM)");
    if(ink&&kk!=="ridge"){p.setAttribute("stroke",ink);p.setAttribute("stroke-opacity",".26");p.setAttribute("stroke-width","1.4");}
    g.appendChild(p);
  }
  GEO.RANGES.forEach(r=>{
    const len=r.pts.reduce((a,_,i)=>i? a+Math.hypot(r.pts[i][0]-r.pts[i-1][0],r.pts[i][1]-r.pts[i-1][1]):0,0);
    /* 淡绿衬晕:主脉背后一层水晕(mountainGlyph 淡绿衬) */
    if(r.ink){
      const mid=sample(r.pts,0.5);
      const e=document.createElementNS(NSx,"ellipse");
      e.setAttribute("cx",mid[0]);e.setAttribute("cy",mid[1]+4);
      e.setAttribute("rx",Math.min(len*0.58,180));e.setAttribute("ry",r.h*1.7);
      e.setAttribute("fill","#a9c2a0");e.setAttribute("opacity",".14");e.setAttribute("filter","url(#mistBM)");
      g.appendChild(e);
    }
    for(let row=0;row<r.rows;row++){
      const dy=row*12+(rnd()*4-2);
      const step=r.step*1.65;
      const nn=Math.max(2,Math.round(len/step));
      const xoff=(row%2)*step*0.5;
      for(let i=0;i<=nn;i++){
        if(rnd()<0.07)continue;
        const p=sample(r.pts,Math.min(1,(i*step+xoff)/Math.max(len,1)));
        const big=rnd()<0.12;
        const h=r.h*(0.55+rnd()*0.9)*(big?1.7:1)*(1-row*0.12);
        const w=step*(0.62+rnd()*0.5);
        const fam=(row>0&&rnd()<0.25)?ALT[r.f]:r.f;
        const x=p[0]+(rnd()*6-3), y=p[1]+dy;
        const kd=rnd();
        const kind=(r.f==="pale"||r.f==="far")?(kd<0.5?"ridge":kd<0.8?"mound":"sanxing")
                                               :(kd<0.42?"mound":kd<0.78?"sanxing":"ridge");
        addHill(x,y,w,h,FILLS[fam],r.op*(0.88+rnd()*0.18)*(1-row*0.07),
          (r.ink&&row===0&&(big||rnd()<0.3))?INKS[fam]:null,kind);
        if(rnd()<0.22)addHill(x+w*(0.5+rnd()*0.3),y+1,w*0.6,h*0.55,FILLS[fam],r.op*0.75,null,"mound");
      }
    }
  });
  GEO.TINTS.forEach(t=>{
    const nn=7+Math.floor(rnd()*5);
    for(let i=0;i<nn;i++){
      const a=rnd()*Math.PI*2, rr=Math.sqrt(rnd());
      addHill(t.cx+Math.cos(a)*t.rx*rr*0.85, t.cy+Math.sin(a)*t.ry*rr*0.85,
        11+rnd()*16, 6+rnd()*10, FILLS.pale, 0.3+rnd()*0.25, null);
    }
  });
  GEO.PLAINS.forEach(b=>{
    const nn=5+Math.floor(rnd()*4);
    for(let i=0;i<nn;i++){
      addHill(b[0]+rnd()*(b[2]-b[0]), b[1]+rnd()*(b[3]-b[1]), 11+rnd()*14, 6+rnd()*9, FILLS.pale, 0.3+rnd()*0.2, null);
    }
  });
  const mists=[[820,470,140,17],[1000,520,120,15],[1080,380,110,17],[560,520,120,14]];
  const mg=document.getElementById("mists");
  mists.forEach(m=>{
    const e=document.createElementNS(NSx,"ellipse");
    e.setAttribute("cx",m[0]);e.setAttribute("cy",m[1]);e.setAttribute("rx",m[2]);e.setAttribute("ry",m[3]);
    e.setAttribute("fill","#ecdfc2");e.setAttribute("opacity",".48");e.setAttribute("filter","url(#mistBM)");
    mg.appendChild(e);
  });
  const clouds=[[1340,300,150,60,.5],[1260,480,140,40,.5],[1180,650,170,40,.5],[950,800,220,45,.55],
    [640,790,180,35,.45],[170,420,120,70,.5],[300,240,180,40,.45],[760,170,260,40,.45],[1400,150,160,50,.4]];
  const cg=document.getElementById("clouds");
  clouds.forEach(c=>{
    const e=document.createElementNS(NSx,"ellipse");
    e.setAttribute("cx",c[0]);e.setAttribute("cy",c[1]);e.setAttribute("rx",c[2]);e.setAttribute("ry",c[3]);
    e.setAttribute("opacity",String(c[4]));e.setAttribute("filter","url(#brushCloudM)");
    cg.appendChild(e);
  });
  /* 驿站真锚点 + 引线(签牌防撞偏移;线指真处,点=考订地点) */
  const ag=document.getElementById("anchors");
  Object.entries(GEO.PTS).forEach(([k,p])=>{
    const [x,y]=p; const o=STATION_OFFSETS[k];
    const ln=document.createElementNS(NSx,"line");
    ln.setAttribute("x1",x);ln.setAttribute("y1",y);
    ln.setAttribute("x2",x+o[0]*0.78);ln.setAttribute("y2",y+o[1]*0.78);
    ln.setAttribute("stroke","#5a4a30");ln.setAttribute("stroke-width","1.2");ln.setAttribute("stroke-opacity",".55");
    ag.appendChild(ln);
    const dot=document.createElementNS(NSx,"circle");
    dot.setAttribute("cx",x);dot.setAttribute("cy",y);dot.setAttribute("r","4.2");
    dot.setAttribute("fill","#a83a29");dot.setAttribute("stroke","#f0e6cc");dot.setAttribute("stroke-width","1.4");
    ag.appendChild(dot);
  });

  /* —— 地名层:锚点竖排地名 + 建康城郭符 + 魏晋要地 + 河名(denseButQuiet)—— */
  (function(){
    const ag=document.getElementById("anchors");
    /* 洛陽 在 CITIES 静默层已有名;建康 由 G02 标注,G10 同城不重复 */
    const PLACE={G01:"朱虛",G02:"建康",G03:"臨沂",G04:"許縣",G06:"譙",G08:"高唐",G09:"陽翟"};
    const POFF={G01:[-16,10],G02:[-18,-2],G03:[13,8],G04:[10,16],G06:[8,14],G08:[-14,-12],G09:[-32,6]};
    Object.entries(GEO.PTS).forEach(([k,p])=>{
      const [x,y]=p;
      if(k==="G02"){ /* 都城城郭符(walledCity) */
        const r1=document.createElementNS(NSx,"rect");
        r1.setAttribute("x",x-7);r1.setAttribute("y",y-7);r1.setAttribute("width",14);r1.setAttribute("height",14);
        r1.setAttribute("fill","none");r1.setAttribute("stroke","#7a5c40");r1.setAttribute("stroke-opacity",".55");
        ag.appendChild(r1);
      }
      if(!PLACE[k])return; /* 同城站不重复挂名 */
      const t=document.createElementNS(NSx,"text");
      const o=POFF[k];
      t.setAttribute("x",x+o[0]);t.setAttribute("y",y+o[1]);
      t.setAttribute("font-size","12.5");t.setAttribute("fill","#6a5c42");t.setAttribute("opacity",".9");
      t.setAttribute("style","writing-mode:vertical-rl;font-family:Kaiti SC,STKaiti,serif;letter-spacing:2px");
      t.textContent=PLACE[k]; ag.appendChild(t);
    });
    Object.entries(GEO.CITIES).forEach(([nm,c])=>{
      const d2=document.createElementNS(NSx,"circle");
      d2.setAttribute("cx",c[0]);d2.setAttribute("cy",c[1]);d2.setAttribute("r","2.4");
      d2.setAttribute("fill","#6a5c42");d2.setAttribute("opacity",".6");
      ag.appendChild(d2);
      const t=document.createElementNS(NSx,"text");
      t.setAttribute("x",c[0]+6);t.setAttribute("y",c[1]+4);
      t.setAttribute("font-size","12");t.setAttribute("fill","#857550");t.setAttribute("opacity",".75");
      t.setAttribute("style","writing-mode:vertical-rl;font-family:Kaiti SC,STKaiti,serif;letter-spacing:2px");
      t.textContent=nm; ag.appendChild(t);
    });
    Object.entries(GEO.RIVLBL).forEach(([nm,c])=>{
      const t=document.createElementNS(NSx,"text");
      t.setAttribute("x",c[0]);t.setAttribute("y",c[1]);
      t.setAttribute("font-size","13");t.setAttribute("fill",nm==="黃河"?"#8a7847":"#4f6f68");t.setAttribute("opacity",".8");
      t.setAttribute("style","writing-mode:vertical-rl;font-family:Kaiti SC,STKaiti,serif;letter-spacing:3px");
      t.textContent=nm; ag.appendChild(t);
    });
  })();
}
/* 10 站防撞排布:东列(朱虛/臨沂/建康)+ 西扇(洛陽×2/陽翟/許縣)+ 各向散点 */
const STATION_OFFSETS={G01:[-8,-84],G02:[95,50],G03:[92,4],G04:[-75,60],G05:[-95,-40],G06:[0,72],G07:[-160,20],G08:[-60,-64],G09:[-20,95],G10:[12,92]};

paintMap();
renderStage();
</script>
